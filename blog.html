---
layout: default
title: Blog
---

<section class="post-index" aria-labelledby="post-index-heading">
  <p class="post-index-feed"><a href="/feed.xml">RSS feed</a></p>

  <h1 id="post-index-heading">Latest Posts</h1>

  <ul>
    {% for post in site.posts %}
      <li>
        <a href="{{ post.url }}">
          <strong>{{ post.title }}</strong>
          <small>{{ post.date | date: "%B %-d, %Y" }}</small>
          <span>{{ post.excerpt | strip_html | truncate: 180 }}</span>
        </a>
      </li>
    {% endfor %}
  </ul>
</section>
